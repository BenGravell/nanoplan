name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/trunk-action@v0.5.1
      - run: trunk build --release --public-url /nanoplan/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      # actions/deploy-pages intermittently fails fast with "Deployment
      # failed, try again later" — a transient error from the Pages backend
      # itself, unrelated to the build (runs 9 and 14 both hit this with an
      # already-successful build). Retry a few times before giving up.
      - uses: actions/deploy-pages@v4
        id: deploy1
        continue-on-error: true
        with:
          # ride out slow Pages queues (run 6 timed out at the 10 min default)
          timeout: 1800000
      - uses: actions/deploy-pages@v4
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        with:
          timeout: 1800000
      - uses: actions/deploy-pages@v4
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        with:
          timeout: 1800000
